<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank you | mob-connect</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="styles.css?v=1db712b">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .ty-section { background: var(--navy-gradient); min-height: 100vh; display: flex; align-items: center; padding: 4rem 0; color: #fff; }
        .ty-card { max-width: 720px; margin: 0 auto; text-align: center; }
        .ty-check { width: 72px; height: 72px; color: var(--teal-brand); margin: 0 auto 1.5rem; }
        .ty-card h1 { color: #fff; margin-bottom: 1rem; }
        .ty-card > p { color: rgba(255,255,255,0.88); font-size: 1.2rem; margin-bottom: 2.5rem; }
        .ty-fallback { color: rgba(255,255,255,0.8); font-size: 1rem; }
        .ty-fallback a { color: var(--teal-brand); font-weight: 600; }
        .ty-home { display: inline-block; margin-top: 2rem; color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .ty-home:hover { color: var(--teal-brand); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo" aria-label="mob-connect home">
                <img src="assets/logo.png" alt="IturanMob" class="logo-img">
            </a>
        </div>
    </nav>

    <section class="ty-section">
        <div class="container">
            <div class="ty-card">
                <svg class="ty-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/>
                </svg>
                <h1>Got it.</h1>
                <!-- Callback confirmation (brief §7 MVP callback model): the chosen
                     slot arrives via same-origin sessionStorage, never URL params.
                     The generic fallback below stands when the slot is absent.
                     Calendly embed removed for MVP; phase 2 if callbacks underperform. -->
                <p id="tyMessage">We'll call you at your chosen time.</p>

                <p class="ty-fallback">
                    Prefer email? Reach us directly at
                    <a id="salesMailto" href="mailto:salesmob@ituranusa.com">salesmob@ituranusa.com</a>.
                </p>

                <a href="index.html" class="ty-home">&larr; Back to home</a>
            </div>
        </div>
    </section>

    <script src="config.js?v=1db712b"></script>
    <script>
        (function () {
            var CFG = window.MOBCONNECT_CONFIG || {};
            window.dataLayer = window.dataLayer || [];

            // Callback slot message (brief §7 MVP callback model): read the chosen
            // slot from same-origin sessionStorage (set by the modal on submit).
            // "Got it. We'll call you [date], [window], [timezone]." Falls back to
            // the generic markup message when the slot is absent or unreadable.
            var hasSlot = false;
            try {
                var slot = JSON.parse(sessionStorage.getItem("mobconnect_callback") || "null");
                if (slot && slot.date && slot.window) {
                    // Parse "YYYY-MM-DD" as LOCAL date (new Date(string) would be UTC and can shift a day).
                    var p = slot.date.split("-");
                    var d = new Date(+p[0], +p[1] - 1, +p[2]);
                    var dateText = d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
                    var tzText = (slot.timezone && slot.timezone !== "other") ? ", " + slot.timezone : "";
                    document.getElementById("tyMessage").textContent =
                        "We'll call you " + dateText + ", " + slot.window + tzText + ".";
                    hasSlot = true;
                }
            } catch (err) { /* fall back to generic message */ }
            window.dataLayer.push({ event: "thank_you_view", has_slot: hasSlot });

            // Wire mailto fallback from config.
            var mailto = document.getElementById("salesMailto");
            if (CFG.SALES_EMAIL && mailto) {
                mailto.href = "mailto:" + CFG.SALES_EMAIL;
                mailto.textContent = CFG.SALES_EMAIL;
            }
        })();
    </script>
</body>
</html>
