                <h1>Got it.</h1>
                <!-- Callback confirmation (brief §7 MVP callback model): the chosen
                     slot arrives via same-origin sessionStorage, never URL params.
                     The generic fallback below stands when the slot is absent.
                     Calendly embed removed for MVP; phase 2 if callbacks underperform. -->
                <p id="tyMessage">We'll call you at your chosen time.</p>

                <p class="ty-fallback">
                    Prefer email? Reach us directly at
                    <a id="salesMailto" href="mailto:salesmob@ituranusa.com">salesmob@ituranusa.com</a>.

            </div>
        </div>
    </section>

    <script src="config.js?v=ce1c0ba"></script>
    <script>
        (function () {
            var CFG = window.MOBCONNECT_CONFIG || {};
            window.dataLayer = window.dataLayer || [];

            // Callback slot message (brief §7 MVP callback model): read the chosen
            // slot from same-origin sessionStorage (set by the modal on submit).
            // "Got it. We'll call you [date], [window], [timezone]." Falls back to
            // the generic markup message when the slot is absent or unreadable.
            var hasSlot = false;
            try {
                var slot = JSON.parse(sessionStorage.getItem("mobconnect_callback") || "null");
                if (slot && slot.date && slot.window) {
                    // Parse "YYYY-MM-DD" as LOCAL date (new Date(string) would be UTC and can shift a day).
                    var p = slot.date.split("-");
                    var d = new Date(+p[0], +p[1] - 1, +p[2]);
                    var dateText = d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
                    var tzText = (slot.timezone && slot.timezone !== "other") ? ", " + slot.timezone : "";
                    document.getElementById("tyMessage").textContent =
                        "We'll call you " + dateText + ", " + slot.window + tzText + ".";
                    hasSlot = true;
                }
            } catch (err) { /* fall back to generic message */ }
            window.dataLayer.push({ event: "thank_you_view", has_slot: hasSlot });

            // Ad conversions (increment #6): fire HERE, not at submit time
            // (submit-time fbq/gtag races the redirect and loses events).
            // Gated on the callback slot (direct visits never count) and
            // deduped across refreshes via the conversion_fired flag.
            var alreadyFired = false;
            try { alreadyFired = !!sessionStorage.getItem("conversion_fired"); } catch (err) {}
            if (hasSlot && !alreadyFired) {
                try { sessionStorage.setItem("conversion_fired", "1"); } catch (err) {}
                if (typeof fbq === "function") fbq('track', 'Lead');
                if (typeof gtag === "function") gtag('event', 'conversion', { 'send_to': 'AW-18140187963/yPQoCN6hodQcELua9clD' });
            }

            // Wire mailto fallback from config.
            var mailto = document.getElementById("salesMailto");
            if (CFG.SALES_EMAIL && mailto) {
                mailto.href = "mailto:" + CFG.SALES_EMAIL;
                mailto.textContent = CFG.SALES_EMAIL;
            }
        })();
    </script>
</body>
